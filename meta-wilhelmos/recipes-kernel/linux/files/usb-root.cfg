# --- USB mass-storage boot path (bare-metal x86-64 booting from USB) ---
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_XHCI_PCI=y
CONFIG_USB_STORAGE=y
CONFIG_SCSI=y
CONFIG_BLK_DEV_SD=y

# --- Filesystems / partitioning for the UEFI GPT layout ---
# VFAT (ESP) needs FAT_FS plus NLS codepages or the option silently drops.
CONFIG_EFI_PARTITION=y
CONFIG_EXT4_FS=y
CONFIG_VFAT_FS=y
CONFIG_FAT_FS=y
CONFIG_NLS_CODEPAGE_437=y
CONFIG_NLS_ISO8859_1=y

# --- UEFI boot (systemd-boot loads the kernel via its EFI stub) ---
CONFIG_EFI=y
CONFIG_EFI_STUB=y

# --- Early /dev ---
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
