# Kernel hardening policy for WilhelmOS (linux-yocto 5.15 / x86_64).
# Verify application with: bitbake linux-yocto -c kernel_configcheck -f
# Lockdown LSM is compiled in but stays inert until lockdown= is passed on
# the kernel cmdline; activation is deferred until verified boot (dm-verity)
# exists, since lockdown without boot integrity gives little real protection.

# --- KASLR ---
CONFIG_RANDOMIZE_BASE=y
CONFIG_RANDOMIZE_MEMORY=y

# --- Stack / memory protections ---
CONFIG_STACKPROTECTOR=y
CONFIG_STACKPROTECTOR_STRONG=y
CONFIG_VMAP_STACK=y
CONFIG_STRICT_KERNEL_RWX=y
CONFIG_STRICT_MODULE_RWX=y
CONFIG_FORTIFY_SOURCE=y
CONFIG_HARDENED_USERCOPY=y
CONFIG_INIT_ON_ALLOC_DEFAULT_ON=y
CONFIG_SLAB_FREELIST_RANDOM=y
CONFIG_SLAB_FREELIST_HARDENED=y
CONFIG_BUG_ON_DATA_CORRUPTION=y

# --- Kernel memory exposure ---
# CONFIG_DEVMEM is not set
CONFIG_STRICT_DEVMEM=y
CONFIG_IO_STRICT_DEVMEM=y
# CONFIG_PROC_KCORE is not set
# CONFIG_LEGACY_PTYS is not set

# --- LSM framework ---
CONFIG_SECURITY=y
CONFIG_SECURITYFS=y
CONFIG_SECURITY_LOCKDOWN_LSM=y
CONFIG_SECURITY_LOCKDOWN_LSM_EARLY=y
CONFIG_SECURITY_YAMA=y
CONFIG_LSM="lockdown,yama,capability"
