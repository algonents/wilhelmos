# meta-wilhelmos/conf/distro/wilhelmos.conf

# Start from Poky defaults
require conf/distro/poky.conf

# Distro identity
DISTRO = "wilhelmos"
DISTRO_NAME = "WilhelmOS"
DISTRO_VERSION = "0.1.0"
DISTRO_CODENAME = "experimental"

# Features / platform policy
DISTRO_FEATURES:append = " efi systemd udev"
DISTRO_FEATURES:remove = " sysvinit"

# Prevent sysvinit from being auto-added back (Yocto backfill)
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"

# Bootloader / EFI
EFI_PROVIDER = "systemd-boot"
# Rollback to grub by uncommenting below.
#EFI_PROVIDER = "grub-efi"
#GRUB_DEPLOY = "1"

# Runtime providers
# BusyBox syslog/klogd are disabled in recipes-core/busybox/busybox_%.bbappend
# so that journald is the only logging path.
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_syslog = "systemd"
VIRTUAL-RUNTIME_initscripts = ""

# Users
INHERIT += "extrausers"

# - Lock root password
# - Create user "wilhelmos" with preset password hash
# - Add to wheel group
# - password hash was created with openssl passwd -6 'wilhelmos’
EXTRA_USERS_PARAMS = "\
    usermod -p '!' root; \
    useradd -m -s /bin/sh wilhelmos; \
    usermod -p '\$6\$c2xI25/4xvQ.UJf0\$GXxGRh8lgtTjkYXbxOJ8m4R1K7hwDTry0ixJ2kTMPoyI3ycFTrpmfXgPmFHT6XfBghzsz6YFwplmuPFUD918E0' wilhelmos; \
    usermod -a -G wheel wilhelmos; \
"

# --- ED-109A Section 7: configuration management / reproducibility evidence ---

# SBOM: SPDX documents per package + image-level archive in tmp/deploy/images/
INHERIT += "create-spdx"
SPDX_PRETTY = "1"

# Binary reproducibility is default-on since honister; assert it explicitly so
# the policy is visible and survives upstream default changes.
BUILD_REPRODUCIBLE_BINARIES = "1"

# Package/image manifest history for regression evidence (build-host artifact,
# committed to a git repo under ${TOPDIR}/buildhistory).
INHERIT += "buildhistory"
BUILDHISTORY_COMMIT = "1"

# --- Persistent logging ---
# /var/log must be real storage, not tmpfs, or journald's Storage=persistent
# (see wilhelmos-journald-conf) is a no-op.
VOLATILE_LOG_DIR = "no"
